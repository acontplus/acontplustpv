# =============================================================================
# nginx/nginx.conf — Configuración global de Nginx
# acontplusTPV — Reverse Proxy + TLS Termination
#
# Hardware objetivo: Hetzner CX32 (4 vCPU, 8 GB RAM)
# Versión Nginx: 1.25+ (alpine)
# =============================================================================

# Número de procesos worker — auto usa todos los cores disponibles
worker_processes auto;

# Límite de descriptores de archivo por worker
# En Hetzner CX32: ulimit -n suele ser 65535
worker_rlimit_nofile 65535;

# Ruta del PID
pid /var/run/nginx.pid;

# Módulos dinámicos
# load_module modules/ngx_http_gzip_static_module.so;

# ── Eventos ──────────────────────────────────────────────────────────────────
events {
  # Conexiones simultáneas por worker (worker_processes * worker_connections = max conns)
  # 4 workers × 4096 = 16384 conexiones simultáneas máximas
  worker_connections 4096;

  # epoll es el mecanismo más eficiente en Linux (disponible en Alpine)
  use epoll;

  # Aceptar múltiples conexiones nuevas en una sola llamada al sistema
  multi_accept on;
}

# ── HTTP ──────────────────────────────────────────────────────────────────────
http {

  # ── Tipos MIME ──────────────────────────────────────────────────────────────
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ─────────────────────────────────────────────────────────────────
  # Formato estructurado para facilitar análisis con herramientas de log
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log  warn;

  # ── Rendimiento ─────────────────────────────────────────────────────────────
  # sendfile: el kernel envía archivos directamente sin copiar a user space
  sendfile           on;
  tcp_nopush         on;  # Enviar headers y inicio de archivo en un solo paquete
  tcp_nodelay        on;  # Desactivar el algoritmo de Nagle (crucial para WebSockets)
  keepalive_timeout  75s; # Mantener conexiones HTTP/1.1 vivas 75s
  keepalive_requests 1000;

  # ── Seguridad básica ─────────────────────────────────────────────────────────
  # Ocultar versión de Nginx en headers y páginas de error
  server_tokens off;

  # Tamaño máximo del body para las mutations de tRPC (batches de inventario/pedidos)
  # 10MB es más que suficiente — el mayor payload esperado es ~500KB
  client_max_body_size 10m;

  # Timeouts de lectura y envío
  client_body_timeout   30s;
  client_header_timeout 10s;
  send_timeout          30s;

  # Buffer de headers de requests (protección básica contra slowloris)
  client_header_buffer_size    1k;
  large_client_header_buffers  4 8k;

  # ── Rate Limiting ────────────────────────────────────────────────────────────
  # Zona de rate limiting para el endpoint de login (protección contra fuerza bruta)
  # 10mb almacena ~160.000 IPs únicas
  # Límite: 10 requests/segundo por IP para rutas de autenticación
  limit_req_zone $binary_remote_addr zone=login_limit:10m  rate=10r/s;

  # Límite general para la API tRPC: 100 requests/segundo por IP
  # Los dispositivos móviles con sync intensivo no deben superar esto
  limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=100r/s;

  # Respuesta 429 (Too Many Requests) en lugar del default 503
  limit_req_status 429;

  # ── Gzip Compression ─────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  # Comprimir JSON, JS, CSS, texto — no imágenes (ya están comprimidas)
  gzip_types
    application/json
    application/javascript
    application/x-javascript
    text/javascript
    text/plain
    text/css
    text/xml
    application/xml
    image/svg+xml;

  # ── SSL/TLS Global ────────────────────────────────────────────────────────────
  # Protocolos seguros — TLS 1.2 mínimo, preferir TLS 1.3
  ssl_protocols             TLSv1.2 TLSv1.3;

  # Ciphers recomendados por Mozilla (Intermediate configuration)
  # Compatible con iOS 12+, Android 8+, Node.js 10+
  ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;

  # Session cache y tickets — mejoran el rendimiento de TLS handshakes
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # OCSP Stapling — el servidor pre-valida el certificado (elimina round-trip al CA)
  ssl_stapling        on;
  ssl_stapling_verify on;
  resolver            8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
  resolver_timeout    5s;

  # Parámetros Diffie-Hellman para Perfect Forward Secrecy
  # Generar con: openssl dhparam -out /etc/nginx/certs/dhparam.pem 2048
  # (Solo necesario si usas DHE ciphers — con ECDHE no es estrictamente requerido)
  # ssl_dhparam /etc/nginx/certs/dhparam.pem;

  # ── Upstream: Fastify API ─────────────────────────────────────────────────────
  upstream fastify_api {
    # Nombre del servicio en la red Docker "proxy"
    server api:3000;

    # keepalive: mantener N conexiones persistentes al upstream
    # Evita el overhead de TCP handshake en cada request
    keepalive 32;
  }

  # ── Upstream: PowerSync Service ───────────────────────────────────────────────
  upstream powersync_service {
    server powersync:8080;

    # PowerSync usa conexiones largas (SSE/WebSockets) — mantener más
    keepalive 64;
  }

  # ── Incluir virtual hosts ─────────────────────────────────────────────────────
  include /etc/nginx/conf.d/*.conf;
}
