# =============================================================================
# nginx/conf.d/powersync.conf
# Virtual host: powersync.resuelveyaa.com → PowerSync Service (puerto 8080)
#
# CRÍTICO — PowerSync usa dos tipos de conexión persistente:
#
#   1. Server-Sent Events (SSE): el cliente abre una conexión HTTP larga
#      para recibir cambios de datos en tiempo real.
#      → proxy_read_timeout: debe ser mayor al heartbeat de PowerSync (30s)
#      → proxy_buffering off: los eventos deben llegar al cliente inmediatamente
#
#   2. WebSockets: upgrading a protocolo WS para comunicación bidireccional.
#      → proxy_http_version 1.1
#      → Upgrade y Connection: upgrade headers obligatorios
#
#   Sin estas configuraciones, Nginx cerraría las conexiones cada 60s
#   (timeout por defecto) partiendo la sincronización offline en el peor
#   momento posible.
# =============================================================================

# ── Mapa para WebSocket Upgrade ───────────────────────────────────────────────
# Si el request tiene Upgrade header → pasar "upgrade" al upstream
# Si no → pasar "" (conexión HTTP normal, keepalive)
# Esto permite que Nginx maneje tanto HTTP como WS en el mismo location
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      "";
}

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────────
server {
  listen      80;
  listen      [::]:80;
  server_name powersync.resuelveyaa.com;

  location /.well-known/acme-challenge/ {
    root /var/www/acme-challenge;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
  listen      443 ssl;
  listen      [::]:443 ssl;
  http2       on;
  server_name powersync.resuelveyaa.com;

  # ── Certificados TLS (Let's Encrypt) ────────────────────────────────────────
  ssl_certificate     /etc/nginx/certs/live/api.resuelveyaa.com/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/live/api.resuelveyaa.com/privkey.pem;
  ssl_trusted_certificate /etc/nginx/certs/live/api.resuelveyaa.com/chain.pem;

  # ── Headers de seguridad ─────────────────────────────────────────────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options    "nosniff"                             always;
  add_header X-Frame-Options           "DENY"                                always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

  # ── Logs ────────────────────────────────────────────────────────────────────
  access_log /var/log/nginx/powersync.access.log main;
  error_log  /var/log/nginx/powersync.error.log  warn;

  # ── Health check de PowerSync ────────────────────────────────────────────────
  location = /api/v1/status {
    proxy_pass         http://powersync_service/api/v1/status;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    access_log off;
  }

  # ── Endpoint de autenticación de PowerSync ───────────────────────────────────
  # PowerSync llama a la API para validar tokens antes de sincronizar
  # Rate limit moderado — no es un endpoint de alta frecuencia
  location /auth/ {
    limit_req zone=login_limit burst=30 nodelay;

    proxy_pass         http://powersync_service/auth/;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── Stream de sincronización (SSE + WebSocket) ───────────────────────────────
  # ESTA ES LA RUTA CRÍTICA DE POWERSYNC
  # Los dispositivos móviles mantienen una conexión abierta aquí durante horas
  location /sync/ {
    proxy_pass         http://powersync_service/sync/;
    proxy_http_version 1.1;

    # ── WebSocket Upgrade ──────────────────────────────────────────────────────
    # Estos dos headers son OBLIGATORIOS para el upgrade a WebSocket
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;

    # Headers de contexto del cliente
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # ── Timeouts para conexiones persistentes ──────────────────────────────────
    # proxy_read_timeout: tiempo máximo de espera entre bytes del upstream
    # PowerSync envía heartbeats cada 30s → configurar muy por encima de eso
    # 3600s = 1 hora: una sesión típica de trabajo en el restaurante
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout 10s;

    # ── Buffering DESACTIVADO ──────────────────────────────────────────────────
    # CRÍTICO para SSE: Nginx NO debe acumular la respuesta antes de enviarla
    # Con buffering ON, los eventos SSE se quedan en buffer hasta que se llena
    # → el dispositivo no recibe cambios en tiempo real
    # → la sincronización "parece" no funcionar aunque PowerSync esté activo
    proxy_buffering            off;
    proxy_cache                off;

    # ── X-Accel-Buffering ────────────────────────────────────────────────────
    # Desactiva buffering a nivel de Nginx Proxy incluso si el upstream
    # no envía el header X-Accel-Buffering: no
    proxy_set_header X-Accel-Buffering no;
  }

  # ── API REST de PowerSync (consultas de estado, admin) ───────────────────────
  location /api/ {
    limit_req zone=api_limit burst=50 nodelay;

    proxy_pass         http://powersync_service/api/;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── Fallback ────────────────────────────────────────────────────────────────
  location / {
    proxy_pass         http://powersync_service/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_buffering       off;
  }
}
