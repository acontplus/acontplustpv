# =============================================================================
# nginx/conf.d/api.conf
# Virtual host: api.tudominio.com → Fastify API (puerto 3000)
#
# Rutas manejadas:
#   /trpc/*               → tRPC mutations y queries
#   /auth/powersync-token → JWT para PowerSync (BLINDAJE B2)
#   /health               → health check (sin rate limit)
#
# TLS: Let's Encrypt via Certbot (contenedor separado)
# Certificados en: /etc/nginx/certs/live/api.tudominio.com/
# =============================================================================

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────────
server {
  listen      80;
  listen      [::]:80;
  server_name api.tudominio.com;

  # Ruta para la validación ACME de Let's Encrypt (certbot --webroot)
  # Certbot escribe aquí el archivo de desafío; CA lo verifica vía HTTP
  location /.well-known/acme-challenge/ {
    root /var/www/acme-challenge;
    # Sin rate limit ni headers especiales — solo servir archivos estáticos
  }

  # Todo el demás tráfico HTTP → redirigir a HTTPS (301 permanente)
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
  listen      443 ssl;
  listen      [::]:443 ssl;
  http2       on;  # HTTP/2 mejora multiplexing — importante para app móvil
  server_name api.tudominio.com;

  # ── Certificados TLS (Let's Encrypt) ────────────────────────────────────────
  ssl_certificate     /etc/nginx/certs/live/api.tudominio.com/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/live/api.tudominio.com/privkey.pem;

  # Trusted certificate chain para OCSP Stapling (configurado en nginx.conf)
  ssl_trusted_certificate /etc/nginx/certs/live/api.tudominio.com/chain.pem;

  # ── Headers de seguridad ─────────────────────────────────────────────────────
  # HSTS: forzar HTTPS por 1 año, incluir subdominios
  # includeSubDomains: todos los subdominios también deben usar HTTPS
  # preload: elegible para la lista de preload de navegadores
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Prevenir que el navegador interprete el tipo MIME incorrectamente
  add_header X-Content-Type-Options "nosniff" always;

  # Prevenir clickjacking — la API no debe renderizarse en iframes
  add_header X-Frame-Options "DENY" always;

  # Habilitar XSS filter en navegadores legacy (IE/Edge antiguos)
  add_header X-XSS-Protection "1; mode=block" always;

  # Referrer Policy — no filtrar el referrer a terceros
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Permissions Policy — deshabilitar APIs no usadas por la app
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Content Security Policy para la API REST
  # La API no sirve HTML — solo JSON, así que CSP restrictiva es segura
  add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

  # ── Logs específicos de este virtual host ────────────────────────────────────
  access_log /var/log/nginx/api.access.log main;
  error_log  /var/log/nginx/api.error.log  warn;

  # ── Health check (sin rate limit, sin auth) ──────────────────────────────────
  # Usado por Docker healthcheck y monitoreo externo (UptimeRobot, etc.)
  location = /health {
    proxy_pass         http://fastify_api/health;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # Desactivar access log para no contaminar logs con checks frecuentes
    access_log off;
  }

  # ── Endpoint PowerSync JWT (rate limit agresivo) ──────────────────────────────
  # Este endpoint emite tokens — proteger contra fuerza bruta
  # Límite: 10 req/s con burst de 20 (sin delay = respuesta inmediata dentro del burst)
  location = /auth/powersync-token {
    limit_req zone=login_limit burst=20 nodelay;

    proxy_pass         http://fastify_api/auth/powersync-token;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # Pasar información del cliente real al backend
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── tRPC API (rate limit moderado) ───────────────────────────────────────────
  # burst=200: permite ráfagas cortas (ej: reconexión de 10 dispositivos simultáneos)
  # nodelay: no encolar — responder inmediato dentro del burst, rechazar si supera
  location /trpc/ {
    limit_req zone=api_limit burst=200 nodelay;

    proxy_pass         http://fastify_api/trpc/;
    proxy_http_version 1.1;

    # keepalive al upstream (requerir Connection: "" para HTTP/1.1 keepalive)
    proxy_set_header   Connection "";

    # Headers de contexto del cliente real
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Timeouts generosos para mutations lentas (arqueo de inventario: ~30s)
    # Coincide con el timeout máximo de withTenantOptions en completeAudit
    proxy_connect_timeout 10s;
    proxy_send_timeout    35s;
    proxy_read_timeout    35s;

    # Buffer de respuesta — desactivar para streaming/SSE si se añade en el futuro
    proxy_buffering on;
    proxy_buffer_size          4k;
    proxy_buffers              8 4k;
    proxy_busy_buffers_size    8k;
  }

  # ── Fallback: cualquier otra ruta a la API ────────────────────────────────────
  location / {
    limit_req zone=api_limit burst=50 nodelay;

    proxy_pass         http://fastify_api/;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}
