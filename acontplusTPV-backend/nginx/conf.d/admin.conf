# =============================================================================
# nginx/conf.d/admin.conf
# Virtual host: admin.tudominio.com → Panel Admin Next.js (estático)
#
# Next.js está configurado con output: 'export' (Master Instructions §1).
# Genera archivos estáticos que Nginx sirve directamente — sin contenedor
# adicional de Node.js para el frontend.
#
# Flujo de deploy del panel admin:
#   1. cd panel-admin && npm run build     → genera carpeta "out/"
#   2. Copiar "out/" al VPS: /app/admin-panel/
#   3. Nginx sirve los archivos desde ese directorio
#
# Ruta en el host (montada en docker-compose.yml como volumen read-only):
#   host: /opt/acontplus/admin-panel/
#   contenedor nginx: /var/www/admin-panel/
# =============================================================================

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────────
server {
  listen      80;
  listen      [::]:80;
  server_name admin.tudominio.com;

  location /.well-known/acme-challenge/ {
    root /var/www/acme-challenge;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
  listen      443 ssl;
  listen      [::]:443 ssl;
  http2       on;
  server_name admin.tudominio.com;

  # ── Certificados TLS (Let's Encrypt) ────────────────────────────────────────
  ssl_certificate     /etc/nginx/certs/live/admin.tudominio.com/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/live/admin.tudominio.com/privkey.pem;
  ssl_trusted_certificate /etc/nginx/certs/live/admin.tudominio.com/chain.pem;

  # ── Headers de seguridad ─────────────────────────────────────────────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options    "nosniff"                                      always;
  add_header X-Frame-Options           "SAMEORIGIN"                                   always;
  # SAMEORIGIN (no DENY) porque el panel puede tener iframes propios (ej: mapas)

  add_header X-XSS-Protection          "1; mode=block"                                always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
  add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

  # CSP para la SPA de Next.js:
  # - default-src 'self': solo recursos del mismo origen por defecto
  # - script-src 'self' 'unsafe-inline': Next.js usa inline scripts en _next/
  # - connect-src: permite llamadas a la API y PowerSync
  # Ajustar los dominios según los valores reales del .env
  add_header Content-Security-Policy
    "default-src 'self'; \
     script-src 'self' 'unsafe-inline' 'unsafe-eval'; \
     style-src 'self' 'unsafe-inline'; \
     img-src 'self' data: blob:; \
     font-src 'self' data:; \
     connect-src 'self' https://api.tudominio.com https://powersync.tudominio.com; \
     frame-ancestors 'self';"
  always;

  # ── Logs ────────────────────────────────────────────────────────────────────
  access_log /var/log/nginx/admin.access.log main;
  error_log  /var/log/nginx/admin.error.log  warn;

  # ── Directorio raíz de los archivos estáticos de Next.js ─────────────────────
  root  /var/www/admin-panel;
  index index.html;

  # ── Archivos estáticos de Next.js (_next/) ────────────────────────────────────
  # Next.js genera assets con hash en el nombre (ej: _next/static/chunks/abc123.js)
  # → Cache agresiva: 1 año (immutable = el hash cambia si el contenido cambia)
  location /_next/static/ {
    alias /var/www/admin-panel/_next/static/;
    expires     1y;
    add_header  Cache-Control "public, max-age=31536000, immutable";
    access_log  off;
  }

  # Imágenes optimizadas de Next.js
  location /_next/image/ {
    proxy_pass  http://fastify_api/_next/image/;
    # Si Next.js no sirve imágenes desde la API, comentar esta línea
    # y dejar que caigan al bloque de archivos estáticos abajo
  }

  # ── Archivos estáticos públicos (favicon, logos, etc.) ───────────────────────
  location /static/ {
    expires    30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
  }

  # Favicon y robots.txt — sin log, con cache moderada
  location ~ ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
    expires    7d;
    access_log off;
  }

  # ── SPA Routing — Next.js App Router / Pages Router ─────────────────────────
  # Next.js con output: 'export' genera archivos HTML por ruta.
  # try_files busca primero el archivo exacto, luego .html, luego index.html
  # Esto permite que rutas como /dashboard → /dashboard.html funcionen
  location / {
    try_files $uri $uri/ $uri.html /index.html;

    # Sin caché en el HTML — siempre pedir la versión más reciente
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma        "no-cache";
    add_header Expires       "0";
  }
}
